<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — RAG Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 6px;
  }

  p.subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="password"]:focus {
    border-color: #6366f1;
  }

  button {
    margin-top: 20px;
    width: 100%;
    padding: 11px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #4f46e5; }

  .error {
    margin-top: 14px;
    font-size: 0.85rem;
    color: #dc2626;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>RAG Research</h1>
    <p class="subtitle">Enter the password to continue</p>
    <form method="POST" action="/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autofocus required>
      <button type="submit">Sign in</button>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
